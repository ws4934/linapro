# HTTP server configuration
# HTTP 服务配置
# Reference: https://goframe.org/docs/web/server-config-file-template
# 参考文档：https://goframe.org/docs/web/server-config-file-template
server:
  # Server listen address
  # 服务监听地址
  address: ":9120"
  # Whether to dump the route table at startup
  # 是否在启动时输出路由表
  dumpRouterMap: false
  # LinaPro extension configuration for the GoFrame server component
  # LinaPro 对 GoFrame server 组件的扩展配置
  extensions:
    # Access path for the host-built OpenAPI JSON document
    # 宿主自建 OpenAPI JSON 文档访问路径
    apiDocPath: "/api.json"

# Logging configuration
# 日志配置
# Reference: https://goframe.org/docs/core/glog-config
# 参考文档：https://goframe.org/docs/core/glog-config
logger:
  # Log file directory; when empty, logs are written only to the terminal
  # 日志文件目录；为空时仅输出到终端
  path: ""
  # Shared filename pattern for business logs and HTTP server logs
  # 业务日志与 HTTP Server 日志共享的文件名模式
  file: "{Y-m-d}.log"
  # Log level
  # 日志级别
  level: "all"
  # Whether to write logs to standard output
  # 是否输出到标准输出
  stdout: true
  # LinaPro extension configuration for the GoFrame logger component
  # LinaPro 对 GoFrame logger 组件的扩展配置
  extensions:
    # Whether to enable GoFrame's official JSON structured log handler
    # 是否开启 GoFrame 官方 JSON 结构化日志 Handler
    structured: false
    # Whether to include TraceID in logs; defaults to false and is output only when explicitly enabled
    # 是否在日志中输出 TraceID；默认 false，仅显式开启时输出
    traceIDEnabled: false

# Database configuration
# 数据库配置
# Reference: https://goframe.org/docs/core/gdb-config-file
# 参考文档：https://goframe.org/docs/core/gdb-config-file
database:
  default:
    # Default database connection string
    # 默认数据库连接串
    # PostgreSQL 14+: pgsql:postgres:postgres@tcp(127.0.0.1:5432)/linapro?sslmode=disable
    link: "pgsql:postgres:postgres@tcp(127.0.0.1:5432)/linapro?sslmode=disable"
    # Whether to enable SQL debug logs; keep disabled by default and enable temporarily for SQL diagnostics
    # 是否开启 SQL 调试日志；默认关闭，排查 SQL 执行明细时再临时开启
    debug: false

# JWT configuration
# JWT 配置
jwt:
  # JWT signing secret
  # JWT 签名密钥
  secret: "lina-jwt-secret-key-change-in-production"
  # Token validity period as a duration string
  # Token 有效期（duration 字符串）
  expire: 24h

# Online session configuration
# 在线会话配置
session:
  # Session inactivity timeout as a duration string
  # 会话无活动超时时间（duration 字符串）
  timeout: 24h
  # Session cleanup job interval as a duration string
  # 会话清理任务执行间隔（duration 字符串）
  cleanupInterval: 5m

# Service monitoring configuration
# 服务监控配置
monitor:
  # Service metrics collection interval as a duration string
  # 服务指标采集间隔（duration 字符串）
  interval: 1m

# Health probe configuration
# 健康探针配置
health:
  # Database probe timeout as a duration string
  # 数据库探活超时时间（duration 字符串）
  timeout: 5s

# Graceful shutdown configuration
# 优雅关停配置
shutdown:
  # Full process shutdown timeout as a duration string
  # 进程关停完整流程超时时间（duration 字符串）
  timeout: 30s

# Scheduler configuration
# 调度器配置
scheduler:
  # Default scheduler timezone; UTC is used when omitted
  # 默认调度时区；未配置时使用 UTC
  defaultTimezone: "UTC"

# Admin workspace routing configuration
# 管理工作台路由配置
workspace:
  # Entry path for the built-in admin workspace. It is startup-scoped and may be
  # "/" for a dedicated admin domain, but must not use "/api", "/x",
  # "/x-assets", or other reserved paths.
  # 内建管理工作台入口路径。该配置在启动期生效；独立管理后台域名场景可使用 "/"，
  # 但不能使用 "/api"、"/x"、"/x-assets" 或其他保留路径。
  basePath: "/admin"

# Internationalization configuration
# 国际化配置
i18n:
  # Default locale used when the request locale is missing or unsupported
  # 请求语言缺失或不支持时使用的默认语言
  default: zh-CN
  # Whether to enable multiple locales; when disabled, only the default locale is used and the frontend hides the language switcher
  # 是否开启多语言；关闭时仅使用默认语言且前端隐藏语言切换按钮
  enabled: true
  # Runtime locale display order and native names; comment out a locale to disable it
  # 运行时语言展示顺序与原生名称；注释某个语言即可停用该语言
  locales:
    - locale: en-US
      nativeName: English
    - locale: zh-CN
      nativeName: 简体中文

# Cluster deployment configuration
# 集群部署配置
cluster:
  # Whether to enable multi-node cluster mode; false means single-node mode by default
  # 是否开启集群多节点模式；默认 false 表示单节点模式
  enabled: false
  # Coordination backend for cluster mode. Required when cluster.enabled=true.
  # Current version supports only "redis". Single-node mode does not require Redis.
  # 集群模式协调后端。cluster.enabled=true 时必填。当前仅支持 "redis"。
  # 单节点模式不需要 Redis。
  coordination: redis
  election:
    # Election lock lease duration
    # 选举锁租约时长
    lease: 30s
    # Lease renewal interval, recommended to be one third of the lease duration
    # 租约续约间隔，建议为租约时长的三分之一
    renewInterval: 10s
  redis:
    # Redis endpoint used by cluster coordination
    # 集群协调使用的 Redis 地址
    address: "127.0.0.1:6379"
    # Redis logical database
    # Redis 逻辑数据库
    db: 0
    # Redis password; leave empty when Redis does not require authentication
    # Redis 密码；Redis 未启用认证时留空
    password: ""
    # Redis connection timeout as a duration string
    # Redis 连接超时时间（duration 字符串）
    connectTimeout: 3s
    # Redis read timeout as a duration string
    # Redis 读取超时时间（duration 字符串）
    readTimeout: 2s
    # Redis write timeout as a duration string
    # Redis 写入超时时间（duration 字符串）
    writeTimeout: 2s

# Upload configuration
# 上传配置
upload:
  # Upload file storage directory
  # 上传文件保存目录
  path: "temp/upload"
  # Maximum size of a single uploaded file in MB
  # 单个上传文件大小上限（MB）
  maxSize: 100

# Plugin configuration
# 插件配置
plugin:
  # Whether platform administrators may force uninstall after lifecycle precondition vetoes; force operations must be audited
  # 是否允许平台管理员在生命周期前置回调否决后强制卸载；强制操作必须审计
  allowForceUninstall: true
  # Dynamic plugin configuration
  # 动态插件相关配置
  dynamic:
    # Storage directory for dynamic plugin build artifacts
    # 动态插件构建产物存储目录
    storagePath: "temp/output"
  # Plugin entries to automatically install and enable at startup. Each entry
  # is a structured object `{id, withMockData}`. `withMockData` defaults to
  # `false`; set it to `true` to also load the plugin's manifest/sql/mock-data
  # SQL during the startup auto-install. Mock data is intended for demo and
  # feature validation, not production use.
  # 启动时自动安装并启用的插件清单。每个条目使用 `{id, withMockData}` 结构化
  # 对象。`withMockData` 缺省为 `false`，显式设为 `true` 才会在启动自动安装
  # 阶段同时加载该插件的 manifest/sql/mock-data SQL。示例数据仅用于演示和
  # 功能验证，不建议生产环境启用。
  autoEnable:
    # - id: "linapro-ops-demo-guard"
    #   withMockData: false
    # - id: "linapro-demo-source"
    # - id: "linapro-demo-dynamic"
    #   withMockData: true
